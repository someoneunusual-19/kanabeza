name: Build Kanabeza APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Flutter 3.41.x includes Dart 3.11.x, fulfilling the >3.9.0 requirement
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        # Using 'dart run' as the modern replacement for 'flutter pub run'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Release APK (Single Universal APK)
        run: flutter build apk --release

      - name: Rename APK with version & date
        run: |
          # Extract version from pubspec.yaml and format date
          VERSION=$(yq '.version' pubspec.yaml)
          DATE=$(date +'%Y%m%d')
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kanabeza-v${VERSION}-${DATE}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanabeza-apk
          path: build/app/outputs/flutter-apk/kanabeza-*.apk
          retention-days: 14

      - name: Build Complete
        run: |
          echo "🎉 Kanabeza APK built successfully!"
          echo "📦 File check: $(ls build/app/outputs/flutter-apk/kanabeza-*.apk)"