name: Build Kanabeza APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Release APK (Single Universal APK)
        run: flutter build apk --release

      - name: Rename APK with version & date
        run: |
          VERSION=$(yq '.version' pubspec.yaml)
          DATE=$(date +'%Y%m%d')
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kanabeza-v${VERSION}-${DATE}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanabeza-apk
          path: build/app/outputs/flutter-apk/kanabeza-*.apk
          retention-days: 14

      - name: Build Complete
        run: |
          echo "🎉 Kanabeza APK built successfully!"
          echo "📦 File: kanabeza-v$(yq '.version' pubspec.yaml)-$(date +'%Y%m%d').apk"